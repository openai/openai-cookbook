name: Rebuild Cookbook Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run when deploy hook is configured (avoid exit 2 from curl with empty URL)
    if: ${{ secrets.WEBSITE_DEPLOY_HOOK_URL != '' }}

    steps:
      - name: Call Deploy Hook
        run: curl -sf -X POST "${{ secrets.WEBSITE_DEPLOY_HOOK_URL }}"
