name: codex-otel-cookbook

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0@sha256:93aad750175cbf1a973ae1c5886c3371f4d800f61be25cdd26870b8441ffe9fa
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    ports:
      - "127.0.0.1:${CODEX_OTEL_HTTP_PORT:-4318}:4318"
      - "127.0.0.1:${CODEX_OTEL_HEALTH_PORT:-13133}:13133"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - loki
      - prometheus
      - tempo
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  prometheus:
    image: prom/prometheus:v3.11.2@sha256:5550dc63da361dc30f6fe02ac0e4dfc736ededfef3c8d12a634db04a67824d78
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "127.0.0.1:${CODEX_OTEL_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  tempo:
    image: grafana/tempo:2.6.1@sha256:ef4384fce6e8ad22b95b243d8fc165628cda655376fd50e7850536ad89d71d50
    command:
      - -config.file=/etc/tempo/tempo.yml
    ports:
      - "127.0.0.1:${CODEX_OTEL_TEMPO_PORT:-3200}:3200"
    volumes:
      - ./tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  loki:
    image: grafana/loki:3.2.1@sha256:09a53b4a4ff81ffcd8f13886df19d33fac7a8d3aaf952e3c7e66cbade5b2fc31
    command:
      - -config.file=/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:${CODEX_OTEL_LOKI_PORT:-3100}:3100"
    volumes:
      - loki-data:/loki
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  grafana:
    image: grafana/grafana:11.2.2@sha256:d5133220d770aba5cb655147b619fa8770b90f41d8489a821d33b1cd34d16f89
    ports:
      - "127.0.0.1:${CODEX_OTEL_GRAFANA_PORT:-3001}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
      - prometheus
      - tempo
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  grafana-data:
  loki-data:
  prometheus-data:
  tempo-data:
